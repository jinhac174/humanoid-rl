# Generic eval config. Task-specific eval overrides (success_tolerance,
# hold_frames, episode_length_s, ...) live under ``eval:`` in
# ``configs/task/<task>.yaml`` and are consumed by the per-task evaluator.
defaults:
  - task: ???
  - _self_

checkpoint: ???

num_episodes: 1
deterministic: true

# Video output
video_fps: 30
video_width: 1280
video_height: 720

# Rendering quality
raytraced: false    # true = path tracing (publication quality, much slower)
spp: 64             # samples per pixel for path tracing (16=fast, 64=good, 128=best)

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
