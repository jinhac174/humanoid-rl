gym_id: Box-Transport
log_name: box_transport
env_cfg_module: tasks.locomotion.box_transport.env_cfg
env_cfg_class: BoxTransportEnvCfg

evaluator_module: tasks.locomotion.box_transport.evaluate
evaluator_class: BoxTransportEvaluator

# Wandb project this task logs to (overrides cfg.wandb.project).
wandb_project: humanoid_locomanipulation
wandb_tag: box_transport

episode_length_s: 30.0

# Training duration. Phase-2 task is harder than velocity tracking; budget
# accordingly. Override at the CLI for smaller probes.
max_iterations: 5000

# ── Action ───────────────────────────────────────────────────────────
action_scale: 0.5

# ── Auto-derived velocity command (read by env.events.update_autocmd) ──
autocmd_lin_vel_max:       1.0
autocmd_ang_vel_max:       1.0
autocmd_heading_stiffness: 0.5
# Distance to active goal at which command magnitude reaches zero.
# 0.50 m → pelvis stops ~0.3 m in front of the (lower) table; box/target
# now sit near the front edge so extended arms reach comfortably.
autocmd_stop_distance:     0.50

# ── Reset noise ──────────────────────────────────────────────────────
reset_pose_x_range:   [-0.20, 0.20]
reset_pose_y_range:   [-0.20, 0.20]
reset_pose_yaw_range: [-0.3, 0.3]
reset_box_xy_range:   0.05      # small — box sits near the table edge
# Target xy half-range sampled around the front-edge anchor (m).
reset_target_xy_half: [0.12, 0.10]

# ── Reward weights ────────────────────────────────────────────────────
# Navigation = phase-1 velocity-tracking reward against the auto-derived
# command. Arm guidance = DENSE reach shaping (rew_reach). Manipulation =
# sparse milestones (bimanual_contact / lift / place). Locomotion
# regularizers restored to phase-1 values for gait quality.

# Locomotion tracking (same defaults as configs/task/velocity_tracking.yaml).
rew_track_lin_vel_xy:         1.0
rew_track_lin_vel_std:        0.5
rew_track_ang_vel_z:          1.0
rew_track_ang_vel_std:        0.5
rew_feet_air_time:            0.75
rew_feet_air_time_threshold:  0.4

# Dense arm-reach shaping — exp(-mean_palm_to_box_dist² / std²), always on.
# Gives the arms a continuous gradient toward the box (and rewards keeping
# the box gripped during the carry). Weight 1.0 = locomotion track scale.
rew_reach:                    1.0
rew_reach_std:                0.5

# Manipulation milestones — moderate / IsaacLab-consistent scales:
# per-step terms O(1-20), one-shot bonuses O(5-300).
rew_bimanual_contact:   5.0       # one-shot — both palms within GRIP_DISTANCE
rew_lift:               100.0     # one-shot — box.z first crosses BOX_LIFT_Z
rew_place_bonus:        20.0      # per-step while box on target within tol
rew_success:            300.0     # one-shot terminal — success criterion met
rew_place_distance_tol: 0.15      # m — counts as "placed"

# Penalties.
pen_drop:               50.0      # one-shot when box hits the floor
pen_termination:        200.0     # one-shot when robot falls
# Locomotion regularizers — restored to phase-1 (velocity_tracking) values.
# The earlier 0.5x reduction degraded gait quality (weird/jumpy gaits).
pen_lin_vel_z:          0.2
pen_ang_vel_xy:         0.05
pen_flat_orientation:   1.0       # pelvis upright
pen_torso_upright:      1.0       # torso_link upright — direct fix for the lean
pen_action_rate:        0.005
pen_dof_torques:        2.0e-6
pen_dof_acc:            1.0e-7
pen_dof_pos_limits:     1.0
pen_feet_slide:         0.1
pen_joint_dev_hip:      0.1
pen_joint_dev_arms:     0.02      # very low — arms must reach for manipulation
pen_joint_dev_hands:    0.01
# POSTURE: 0.3 did not fix the backward lean; bumped to 0.6 and backed by
# the pen_torso_upright term above.
pen_joint_dev_waist:    0.6

# ── Termination ──────────────────────────────────────────────────────
termination_base_height:   0.4
termination_gravity_z:    -0.4
illegal_contact_threshold: 1.0
box_drop_z:                0.20    # box center below this counts as "on floor"
# Number of consecutive control steps the box must be within
# rew_place_distance_tol of the target before success terminates the episode.
# 25 at 50 Hz = 0.5 s.
success_steps_required:    25

# ── Observation noise ────────────────────────────────────────────────
obs_noise_enabled:        true
obs_noise_base_lin_vel:   0.1
obs_noise_base_ang_vel:   0.2
obs_noise_projected_grav: 0.05
obs_noise_joint_pos:      0.01
obs_noise_joint_vel:      1.5
obs_noise_box_pos:        0.01

# ── Eval-time overrides ──────────────────────────────────────────────
eval:
  episode_length_s:  30.0
  obs_noise_enabled: false
  # No pinned command in this task — the policy reacts to the live scene.

# ── Cameras for the rendered MP4 (tracking cameras, robot-relative) ──
# See evaluate.py: each frame, eye/lookat are translated by the robot's
# current world XY (Z absolute). lookat is now (0,0,0.5) — directly on
# the robot — so the robot stays CENTRED in frame for the whole episode
# (the earlier forward-offset lookat pushed the scene to one side).
# The eye is a fixed world-frame offset, so the robot is viewed from a
# consistent angle as it walks the L.
cameras:
  follow:
    eye:    [-2.0, 3.5, 2.4]    # back-left-up of the robot
    lookat: [0.0, 0.0, 0.5]     # the robot itself (torso height)
  side:
    eye:    [3.5, 3.5, 1.9]     # front-left of the robot
    lookat: [0.0, 0.0, 0.5]

viewer:
  resolution:  [1280, 720]
  env_index:   0
  origin_type: world
