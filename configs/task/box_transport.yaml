gym_id: Box-Transport
log_name: box_transport
env_cfg_module: tasks.locomotion.box_transport.env_cfg
env_cfg_class: BoxTransportEnvCfg

evaluator_module: tasks.locomotion.box_transport.evaluate
evaluator_class: BoxTransportEvaluator

# Wandb project this task logs to (overrides cfg.wandb.project).
wandb_project: humanoid_locomanipulation
wandb_tag: box_transport

episode_length_s: 30.0

# Training duration. Phase-2 task is harder than velocity tracking; budget
# accordingly. Override at the CLI for smaller probes.
max_iterations: 5000

# ── Action ───────────────────────────────────────────────────────────
action_scale: 0.5

# ── Auto-derived velocity command (read by env.events.update_autocmd) ──
autocmd_lin_vel_max:       1.0
autocmd_ang_vel_max:       1.0
autocmd_heading_stiffness: 0.5
autocmd_stop_distance:     0.30

# ── Reset noise ──────────────────────────────────────────────────────
reset_pose_x_range:   [-0.20, 0.20]
reset_pose_y_range:   [-0.20, 0.20]
reset_pose_yaw_range: [-0.3, 0.3]
reset_box_xy_range:   0.10
# Target xy half-extent on the target-table top (m).
reset_target_xy_half: [0.20, 0.20]

# ── Reward weights ────────────────────────────────────────────────────
# Architecture: phase-1 velocity tracking reward applied against the
# auto-derived command (events.update_autocmd) drives navigation; sparse
# manipulation milestones drive the grasp/lift/place. The "walk-to-X"
# behaviour emerges from the policy tracking the high-level command.

# Locomotion tracking (same defaults as configs/task/velocity_tracking.yaml).
rew_track_lin_vel_xy:         1.0
rew_track_lin_vel_std:        0.5
rew_track_ang_vel_z:          1.0
rew_track_ang_vel_std:        0.5
rew_feet_air_time:            0.75
rew_feet_air_time_threshold:  0.4

# Manipulation milestones.
rew_bimanual_contact:   10.0      # sparse one-shot — both palms within GRIP_DISTANCE
rew_lift:               100.0     # sparse one-shot — box.z first crosses BOX_LIFT_Z
rew_place_bonus:        500.0     # continuous while placed (per-step)
rew_place_distance_tol: 0.15      # m — counts as "placed"

# Penalties.
pen_drop:               100.0     # one-shot when box hits the floor
pen_termination:        200.0     # one-shot when robot falls
pen_lin_vel_z:          0.1
pen_ang_vel_xy:         0.025
pen_flat_orientation:   0.5
pen_action_rate:        0.0025
pen_dof_torques:        1.0e-6
pen_dof_acc:            0.5e-7
pen_dof_pos_limits:     0.5
pen_feet_slide:         0.05
pen_joint_dev_hip:      0.05
pen_joint_dev_arms:     0.05      # lower than locomotion — arms must move
pen_joint_dev_hands:    0.025
# POSTURE FIX: bumped from 0.1 → 0.3 to address the backward waist lean
# from the locomotion checkpoints.
pen_joint_dev_waist:    0.3

# ── Termination ──────────────────────────────────────────────────────
termination_base_height:   0.4
termination_gravity_z:    -0.4
illegal_contact_threshold: 1.0
box_drop_z:                0.10
# Number of consecutive control steps the box must be within
# rew_place_distance_tol of the target before success terminates the episode.
# 25 at 50 Hz = 0.5 s.
success_steps_required:    25

# ── Observation noise ────────────────────────────────────────────────
obs_noise_enabled:        true
obs_noise_base_lin_vel:   0.1
obs_noise_base_ang_vel:   0.2
obs_noise_projected_grav: 0.05
obs_noise_joint_pos:      0.01
obs_noise_joint_vel:      1.5
obs_noise_box_pos:        0.01

# ── Eval-time overrides ──────────────────────────────────────────────
eval:
  episode_length_s:  30.0
  obs_noise_enabled: false
  # No pinned command in this task — the policy reacts to the live scene.

# ── Cameras for the rendered MP4 (tracking cameras, robot-relative) ──
# See evaluate.py: each frame, eye/lookat are translated by the robot's
# current world XY (Z absolute). For this task we want BOTH tables in
# frame, so lookat is offset forward (+x) past the robot — the eye sits
# back-right (follow) or side-on (side) far enough that the corridor
# from x=1.3 (start table) to x=4.0 (target table) fits in view.
# These offsets also work for scripts/scene_load.py: with the robot
# at world origin, eye/lookat are interpreted as absolute world coords
# and frame the static scene correctly.
cameras:
  follow:
    eye:    [-1.5, 5.5, 2.5]    # 1.5 m behind, 5.5 m to side, 2.5 m up
    lookat: [2.5, 0.0, 0.5]     # mid-corridor between the two tables
  side:
    eye:    [2.5, 6.0, 1.5]     # 2.5 m along corridor, 6 m to side
    lookat: [2.5, 0.0, 0.5]     # same lookat as follow

viewer:
  resolution:  [1280, 720]
  env_index:   0
  origin_type: world
